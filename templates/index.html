<!DOCTYPE html>
<html>
<head>
    <title>Choose Your Path</title>
</head>

<body style="margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
font-family:Segoe UI,Arial,sans-serif;">

<div style="width:900px;
padding:40px;
background:rgba(255,255,255,0.08);
border-radius:25px;
backdrop-filter:blur(12px);
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.4);">

<h1 style="color:white;font-size:42px;margin-bottom:10px;">
Choose Your Theme
</h1>

<p style="color:#d1d5db;font-size:18px;margin-bottom:45px;">
Every journey begins with a choice.
</p>

<div style="display:flex;justify-content:center;gap:50px;">

<!-- Male -->

<div onclick="window.location='male.html'"
style="width:280px;
padding:35px;
border-radius:20px;
cursor:pointer;
background:linear-gradient(180deg,#FFD54F,#FF9800);
box-shadow:0 10px 25px rgba(255,193,7,.5);
transition:0.3s;">

<div style="font-size:80px;">☀️</div>

<h2 style="color:#5d3700;">Male</h2>

<p style="color:#6b3f00;">
Step into the warmth, strength, and energy of the Sun.
</p>

<button style="margin-top:20px;
padding:12px 28px;
border:none;
border-radius:30px;
background:white;
font-size:16px;
cursor:pointer;">
Enter →
</button>

</div>

<!-- Female -->

<div onclick="window.location='female.html'"
style="width:280px;
padding:35px;
border-radius:20px;
cursor:pointer;
background:linear-gradient(180deg,#C7D2FE,#818CF8);
box-shadow:0 10px 25px rgba(129,140,248,.5);">

<div style="font-size:80px;">🌙</div>

<h2 style="color:#1E3A8A;">Female</h2>

<p style="color:#1E40AF;">
Embrace the calm, elegance, and mystery of the Moon.
</p>

<button style="margin-top:20px;
padding:12px 28px;
border:none;
border-radius:30px;
background:white;
font-size:16px;
cursor:pointer;">
Enter →
</button>

</div>

</div>

</div>

</body>
</html>
